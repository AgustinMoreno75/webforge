<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>WebForge | Login</title>
    <link rel="icon" type="image/png" href="/assets/WebForgeLogoMain.png" />
    <style>
      :root {
        --wf-dark-blue: #0b1d3a;
        --wf-cyan: #22c1c3;
        --wf-purple: #6a5ae0;
        --wf-orange: #ff8a3d;
        --wf-red: #ff4d5a;
        --wf-white: #ffffff;
        --wf-border: rgba(229, 231, 235, 0.2);
        --wf-surface: rgba(8, 20, 42, 0.78);
        --wf-shadow: 0 14px 40px rgba(0, 0, 0, 0.35);
        --wf-gradient: linear-gradient(110deg, var(--wf-cyan), var(--wf-purple), var(--wf-orange), var(--wf-red));
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        padding: 0;
      }

      body {
        min-height: 100vh;
        font-family: "Inter", sans-serif;
        color: var(--wf-white);
        background:
          radial-gradient(circle at 10% -20%, rgba(34, 193, 195, 0.22), transparent 46%),
          radial-gradient(circle at 92% 20%, rgba(106, 90, 224, 0.2), transparent 36%),
          radial-gradient(circle at 50% 110%, rgba(255, 77, 90, 0.2), transparent 43%),
          var(--wf-dark-blue);
        display: grid;
        place-items: center;
        padding: 24px;
      }

      .login-shell {
        width: min(460px, 100%);
        border: 1px solid var(--wf-border);
        border-radius: 18px;
        background: var(--wf-surface);
        backdrop-filter: blur(14px);
        box-shadow: var(--wf-shadow);
        padding: 28px;
      }

      .brand {
        display: inline-flex;
        align-items: center;
        gap: 12px;
        text-decoration: none;
        margin-bottom: 18px;
      }

      .brand img {
        width: 42px;
        height: 42px;
        object-fit: contain;
      }

      .brand strong {
        font-family: "Montserrat", sans-serif;
        color: var(--wf-white);
        font-size: 1.1rem;
      }

      h1 {
        margin: 0 0 10px;
        font-family: "Montserrat", sans-serif;
        font-size: 1.6rem;
      }

      p {
        margin: 0 0 22px;
        color: rgba(229, 231, 235, 0.86);
      }

      form {
        display: grid;
        gap: 12px;
      }

      label {
        font-size: 0.84rem;
        font-weight: 600;
        color: rgba(229, 231, 235, 0.9);
      }

      input {
        width: 100%;
        min-height: 44px;
        border-radius: 10px;
        border: 1px solid rgba(229, 231, 235, 0.2);
        background: rgba(255, 255, 255, 0.04);
        color: var(--wf-white);
        padding: 0 12px;
        font-size: 0.95rem;
      }

      input:focus {
        outline: none;
        border-color: rgba(34, 193, 195, 0.6);
        box-shadow: 0 0 0 3px rgba(34, 193, 195, 0.16);
      }

      .submit {
        margin-top: 8px;
        min-height: 44px;
        border: 0;
        border-radius: 12px;
        color: var(--wf-white);
        font-family: "Montserrat", sans-serif;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 0.08em;
        background: var(--wf-gradient);
        background-size: 200% 200%;
        box-shadow: 0 10px 24px rgba(255, 138, 61, 0.28);
        cursor: pointer;
      }

      .submit:hover {
        background-position: 100% 0;
      }

      .submit:disabled {
        opacity: 0.75;
        cursor: not-allowed;
      }

      .form-status {
        min-height: 20px;
        margin-top: 6px;
        font-size: 0.84rem;
        color: rgba(229, 231, 235, 0.9);
      }

      .form-status.error {
        color: #ff9aa3;
      }

      .form-status.ok {
        color: #81f7e3;
      }

      .back-link {
        display: inline-block;
        margin-top: 16px;
        color: rgba(229, 231, 235, 0.9);
        text-decoration: none;
        font-size: 0.88rem;
      }

      .back-link:hover {
        color: var(--wf-cyan);
      }

      .micro-link {
        margin-top: 10px;
        text-align: center;
        font-size: 0.84rem;
        color: rgba(229, 231, 235, 0.84);
      }

      .micro-link a {
        color: var(--wf-cyan);
        text-decoration: none;
      }

      .separator {
        display: grid;
        grid-template-columns: 1fr auto 1fr;
        align-items: center;
        gap: 10px;
        margin: 16px 0 6px;
        color: rgba(229, 231, 235, 0.76);
        font-size: 0.78rem;
      }

      .separator::before,
      .separator::after {
        content: "";
        height: 1px;
        background: rgba(229, 231, 235, 0.18);
      }

      .google-area {
        margin-top: 12px;
        display: flex;
        justify-content: center;
      }

      .google-note {
        margin-top: 8px;
        text-align: center;
        font-size: 0.78rem;
        color: rgba(229, 231, 235, 0.72);
      }

      .forgot-link {
        display: block;
        text-align: right;
        font-size: 0.78rem;
        color: rgba(229, 231, 235, 0.55);
        text-decoration: none;
        margin-top: 6px;
        cursor: pointer;
        background: none;
        border: none;
        padding: 0;
        font-family: inherit;
        transition: color 0.2s;
      }
      .forgot-link:hover { color: var(--wf-cyan); }

      .forgot-box {
        background: rgba(34, 193, 195, 0.06);
        border: 1px solid rgba(34, 193, 195, 0.2);
        border-radius: 12px;
        padding: 18px;
        margin-top: 14px;
      }

      .forgot-box p {
        font-size: 0.8rem;
        color: rgba(229, 231, 235, 0.7);
        margin: 0 0 10px;
      }

      .forgot-box input {
        width: 100%;
        padding: 10px 14px;
        background: rgba(255,255,255,0.06);
        border: 1px solid rgba(229, 231, 235, 0.18);
        border-radius: 10px;
        color: #fff;
        font-size: 0.88rem;
        font-family: inherit;
        outline: none;
        margin-bottom: 10px;
      }

      .forgot-box input:focus { border-color: rgba(34, 193, 195, 0.5); }

      .forgot-box button {
        width: 100%;
        padding: 10px;
        background: rgba(34, 193, 195, 0.2);
        border: 1px solid rgba(34, 193, 195, 0.4);
        border-radius: 10px;
        color: var(--wf-cyan);
        font-size: 0.85rem;
        font-weight: 700;
        font-family: inherit;
        cursor: pointer;
        transition: background 0.2s;
      }
      .forgot-box button:hover:not(:disabled) { background: rgba(34, 193, 195, 0.3); }
      .forgot-box button:disabled { opacity: 0.5; cursor: not-allowed; }

      .verify-box {
        background: rgba(37, 99, 235, 0.08);
        border: 1px solid rgba(37, 99, 235, 0.28);
        border-radius: 12px;
        padding: 16px 18px;
        margin-top: 12px;
      }

      .verify-box p {
        margin: 0 0 10px;
        font-size: 0.8rem;
        color: rgba(229, 231, 235, 0.78);
      }

      .verify-box button {
        width: 100%;
        padding: 10px;
        background: rgba(37, 99, 235, 0.18);
        border: 1px solid rgba(37, 99, 235, 0.36);
        border-radius: 10px;
        color: #bfdbfe;
        font-size: 0.85rem;
        font-weight: 700;
        font-family: inherit;
        cursor: pointer;
        transition: background 0.2s;
      }

      .verify-box button:hover:not(:disabled) { background: rgba(37, 99, 235, 0.28); }
      .verify-box button:disabled { opacity: 0.5; cursor: not-allowed; }

      .verify-status {
        font-size: 0.78rem;
        margin-top: 8px;
        min-height: 16px;
      }

      .verify-status.ok { color: #81f7e3; }
      .verify-status.error { color: #ff9aa3; }

      .forgot-status {
        font-size: 0.78rem;
        margin-top: 8px;
        min-height: 16px;
      }
      .forgot-status.ok { color: #81f7e3; }
      .forgot-status.error { color: #ff9aa3; }
    </style>
  </head>
  <body>
    <main class="login-shell" aria-label="Login WebForge">
      <a class="brand" href="/" aria-label="Volver a WebForge">
        <img src="/assets/WebForgeLogo-NoBackground.png" alt="WebForge" />
        <strong>WebForge</strong>
      </a>

      <h1>Iniciar sesion</h1>
      <p>Accede a tu panel WebForge.</p>

      <form id="login-form" novalidate>
        <div>
          <label for="email">Email</label>
          <input id="email" name="email" type="email" required />
        </div>

        <div>
          <label for="password">Contrasena</label>
          <input id="password" name="password" type="password" required />
        </div>

        <button class="submit" type="submit">Entrar</button>
        <p class="form-status" id="form-status" aria-live="polite"></p>
      </form>

      <div class="verify-box" id="verify-box" style="display:none;" aria-live="polite">
        <p>Si tu correo todavía no está verificado, te reenviamos el enlace a ese mismo email.</p>
        <button id="verify-btn" type="button" onclick="resendVerification()">Reenviar email de verificación</button>
        <p class="verify-status" id="verify-status"></p>
      </div>

      <button class="forgot-link" id="forgot-toggle" onclick="toggleForgot()">¿Olvidaste tu contraseña?</button>

      <div class="forgot-box" id="forgot-box" style="display:none;" aria-live="polite">
        <p>Ingresá tu email y te enviaremos un enlace para restablecer tu contraseña.</p>
        <input type="email" id="forgot-email" placeholder="tu@email.com" maxlength="120" />
        <button id="forgot-btn" onclick="sendReset()">Enviar enlace</button>
        <p class="forgot-status" id="forgot-status"></p>
      </div>

      <p class="micro-link">No tienes cuenta? <a href="/register.html">Crear Cuenta</a></p>

      <div class="separator">o</div>
      <div class="google-area" id="google-button-container"></div>
      <p class="google-note" id="google-note">Google Sign-In no disponible.</p>

      <a class="back-link" href="/">Volver al sitio</a>
    </main>

    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <script>
      const form = document.getElementById('login-form')
      const statusNode = document.getElementById('form-status')
      const submitButton = form.querySelector('button[type="submit"]')
      const googleContainer = document.getElementById('google-button-container')
      const googleNote = document.getElementById('google-note')
      const verifyBox = document.getElementById('verify-box')
      const verifyButton = document.getElementById('verify-btn')
      const verifyStatus = document.getElementById('verify-status')
      const emailInput = document.getElementById('email')

      const setStatus = (message, type = '') => {
        statusNode.textContent = message
        statusNode.className = `form-status ${type}`.trim()
      }

      const hideVerificationHelp = () => {
        verifyBox.style.display = 'none'
        verifyStatus.textContent = ''
        verifyStatus.className = 'verify-status'
        verifyButton.disabled = false
        verifyButton.textContent = 'Reenviar email de verificación'
      }

      const showVerificationHelp = () => {
        verifyBox.style.display = 'block'
      }

      const parseApiResponse = async (response) => {
        const contentType = response.headers.get('content-type') || ''
        if (!contentType.includes('application/json')) {
          const raw = await response.text()
          return {
            success: false,
            message: raw?.trim() || `Respuesta no JSON del servidor (HTTP ${response.status}).`,
          }
        }

        const raw = await response.text()
        if (!raw) {
          return {
            success: false,
            message: `Respuesta vacia del servidor (HTTP ${response.status}).`,
          }
        }

        try {
          return JSON.parse(raw)
        } catch {
          return {
            success: false,
            message: `JSON invalido del servidor (HTTP ${response.status}).`,
          }
        }
      }

      const getHttpErrorMessage = (response, result, fallbackMessage) => {
        if (result?.message) return result.message
        if (response.status === 502 || response.status === 503) {
          return 'El backend no esta disponible. Inicia el servidor API y vuelve a intentar.'
        }
        return fallbackMessage
      }

      const redirectByRole = (result) => {
        const role = result?.user?.accountType
        if (role === 'CEO' || role === 'SUPER_ADMIN') return '/admin.html'
        return '/cuenta.html'
      }

      const handleAuthSuccess = (result) => {
        localStorage.setItem('webforge_token', result.token)
        localStorage.setItem('webforge_user', JSON.stringify(result.user || {}))
        setStatus('Ingreso correcto. Redirigiendo al panel...', 'ok')
        const pendingPlan = sessionStorage.getItem('webforge_pending_plan')
        setTimeout(() => {
          if (pendingPlan) {
            sessionStorage.removeItem('webforge_pending_plan')
            window.location.href = '/plans.html'
            return
          }
          window.location.href = redirectByRole(result)
        }, 550)
      }

      form.addEventListener('submit', async (event) => {
        event.preventDefault()
        setStatus('')
        hideVerificationHelp()

        const formData = new FormData(form)
        const payload = {
          email: String(formData.get('email') || '').trim(),
          password: String(formData.get('password') || ''),
        }

        if (!payload.email || !payload.password) {
          setStatus('Completa email y contrasena.', 'error')
          return
        }

        submitButton.disabled = true
        submitButton.textContent = 'Validando...'

        try {
          const response = await fetch('/api/auth/login', {
            method: 'POST',
            headers: {
              'Content-Type': 'application/json',
              Accept: 'application/json',
            },
            body: JSON.stringify(payload),
          })

          const result = await parseApiResponse(response)
          if (!response.ok && result?.code === 'EMAIL_NOT_VERIFIED') {
            showVerificationHelp()
          }
          if (!response.ok || !result.success || !result.token) {
            throw new Error(getHttpErrorMessage(response, result, 'No se pudo iniciar sesion'))
          }

          handleAuthSuccess(result)
        } catch (error) {
          setStatus(error.message || 'Error de autenticacion.', 'error')
        } finally {
          submitButton.disabled = false
          submitButton.textContent = 'Entrar'
        }
      })

      async function resendVerification() {
        const email = emailInput.value.trim()
        if (!email) {
          verifyStatus.textContent = 'Ingresá tu email para reenviar la verificación.'
          verifyStatus.className = 'verify-status error'
          return
        }

        verifyButton.disabled = true
        verifyButton.textContent = 'Reenviando...'
        verifyStatus.textContent = ''

        try {
          const response = await fetch('/api/auth/resend-verification', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json', Accept: 'application/json' },
            body: JSON.stringify({ email }),
          })
          const result = await parseApiResponse(response)
          if (!response.ok || !result.success) {
            throw new Error(getHttpErrorMessage(response, result, 'No se pudo reenviar el email de verificacion'))
          }

          verifyStatus.textContent = result.message || 'Si la cuenta existe, reenviamos el correo de verificación.'
          verifyStatus.className = 'verify-status ok'
          verifyButton.textContent = 'Reenviado ✓'
        } catch (error) {
          verifyStatus.textContent = error.message || 'Error al reenviar el email de verificación.'
          verifyStatus.className = 'verify-status error'
          verifyButton.disabled = false
          verifyButton.textContent = 'Reenviar email de verificación'
        }
      }

      const initGoogle = async () => {
        try {
          const response = await fetch('/api/auth/google/config', { headers: { Accept: 'application/json' } })
          const config = await parseApiResponse(response)

          if (!response.ok || !config.enabled || !config.clientId || !window.google?.accounts?.id) {
            googleNote.textContent = 'Google Sign-In no disponible en este entorno.'
            return
          }

          window.google.accounts.id.initialize({
            client_id: config.clientId,
            callback: async (googleResponse) => {
              setStatus('Validando Google Sign-In...')
              try {
                const authResponse = await fetch('/api/auth/google', {
                  method: 'POST',
                  headers: {
                    'Content-Type': 'application/json',
                    Accept: 'application/json',
                  },
                  body: JSON.stringify({ credential: googleResponse.credential }),
                })

                const authResult = await parseApiResponse(authResponse)
                if (!authResponse.ok || !authResult.success || !authResult.token) {
                  throw new Error(getHttpErrorMessage(authResponse, authResult, 'No se pudo ingresar con Google'))
                }

                handleAuthSuccess(authResult)
              } catch (error) {
                setStatus(error.message || 'Error con Google Sign-In.', 'error')
              }
            },
          })

          window.google.accounts.id.renderButton(googleContainer, {
            type: 'standard',
            theme: 'outline',
            text: 'continue_with',
            shape: 'pill',
            size: 'large',
            width: 320,
          })

          googleNote.textContent = 'Tambien puedes entrar con Google.'
        } catch {
          googleNote.textContent = 'Google Sign-In no disponible en este entorno.'
        }
      }

      window.addEventListener('load', initGoogle)

      // ── Forgot password ──
      function toggleForgot() {
        const box = document.getElementById('forgot-box')
        const toggle = document.getElementById('forgot-toggle')
        const isHidden = box.style.display === 'none'
        box.style.display = isHidden ? 'block' : 'none'
        toggle.textContent = isHidden ? 'Cancelar' : '¿Olvidaste tu contraseña?'
        if (isHidden) document.getElementById('forgot-email').focus()
      }

      async function sendReset() {
        const email = document.getElementById('forgot-email').value.trim()
        const btn = document.getElementById('forgot-btn')
        const status = document.getElementById('forgot-status')

        if (!email) {
          status.textContent = 'Ingresá tu email.'
          status.className = 'forgot-status error'
          return
        }

        btn.disabled = true
        btn.textContent = 'Enviando...'
        status.textContent = ''

        try {
          const res = await fetch('/api/auth/forgot-password', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json', Accept: 'application/json' },
            body: JSON.stringify({ email }),
          })
          const data = await res.json()
          status.textContent = data.message || 'Si tu email está registrado, recibirás instrucciones.'
          status.className = 'forgot-status ok'
          btn.textContent = 'Enviado ✓'
        } catch {
          status.textContent = 'Error al enviar. Intentá nuevamente.'
          status.className = 'forgot-status error'
          btn.disabled = false
          btn.textContent = 'Enviar enlace'
        }
      }
    </script>
  </body>
  <script src="/cookie-banner.js" defer></script>
  </body>
</html>
