<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>WebForge | Registro</title>
    <link rel="icon" type="image/png" href="/assets/WebForgeLogoMain.png" />
    <style>
      :root {
        --wf-dark-blue: #0b1d3a;
        --wf-cyan: #22c1c3;
        --wf-purple: #6a5ae0;
        --wf-orange: #ff8a3d;
        --wf-red: #ff4d5a;
        --wf-white: #ffffff;
        --wf-border: rgba(229, 231, 235, 0.2);
        --wf-surface: rgba(8, 20, 42, 0.78);
        --wf-shadow: 0 14px 40px rgba(0, 0, 0, 0.35);
        --wf-gradient: linear-gradient(110deg, var(--wf-cyan), var(--wf-purple), var(--wf-orange), var(--wf-red));
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        padding: 0;
      }

      body {
        min-height: 100vh;
        font-family: "Inter", sans-serif;
        color: var(--wf-white);
        background:
          radial-gradient(circle at 10% -20%, rgba(34, 193, 195, 0.22), transparent 46%),
          radial-gradient(circle at 92% 20%, rgba(106, 90, 224, 0.2), transparent 36%),
          radial-gradient(circle at 50% 110%, rgba(255, 77, 90, 0.2), transparent 43%),
          var(--wf-dark-blue);
        display: grid;
        place-items: center;
        padding: 24px;
      }

      .register-shell {
        width: min(520px, 100%);
        border: 1px solid var(--wf-border);
        border-radius: 18px;
        background: var(--wf-surface);
        backdrop-filter: blur(14px);
        box-shadow: var(--wf-shadow);
        padding: 28px;
      }

      .brand {
        display: inline-flex;
        align-items: center;
        gap: 12px;
        text-decoration: none;
        margin-bottom: 18px;
      }

      .brand img {
        width: 42px;
        height: 42px;
        object-fit: contain;
      }

      .brand strong {
        font-family: "Montserrat", sans-serif;
        color: var(--wf-white);
        font-size: 1.1rem;
      }

      h1 {
        margin: 0 0 10px;
        font-family: "Montserrat", sans-serif;
        font-size: 1.6rem;
      }

      p {
        margin: 0 0 22px;
        color: rgba(229, 231, 235, 0.86);
      }

      form {
        display: grid;
        gap: 12px;
      }

      .grid {
        display: grid;
        gap: 12px;
        grid-template-columns: 1fr 1fr;
      }

      @media (max-width: 640px) {
        .grid {
          grid-template-columns: 1fr;
        }
      }

      label {
        font-size: 0.84rem;
        font-weight: 600;
        color: rgba(229, 231, 235, 0.9);
      }

      input[type="text"],
      input[type="email"],
      input[type="password"] {
        width: 100%;
        min-height: 44px;
        border-radius: 10px;
        border: 1px solid rgba(229, 231, 235, 0.2);
        background: rgba(255, 255, 255, 0.04);
        color: var(--wf-white);
        padding: 0 12px;
        font-size: 0.95rem;
      }

      input:focus {
        outline: none;
        border-color: rgba(34, 193, 195, 0.6);
        box-shadow: 0 0 0 3px rgba(34, 193, 195, 0.16);
      }

      .terms {
        display: flex;
        align-items: flex-start;
        gap: 10px;
        margin-top: 4px;
        font-size: 0.84rem;
        color: rgba(229, 231, 235, 0.9);
      }

      .terms input {
        margin-top: 2px;
      }

      .terms a {
        color: var(--wf-cyan);
        text-decoration: none;
      }

      .submit {
        margin-top: 2px;
        min-height: 44px;
        border: 0;
        border-radius: 12px;
        color: var(--wf-white);
        font-family: "Montserrat", sans-serif;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 0.08em;
        background: var(--wf-gradient);
        background-size: 200% 200%;
        box-shadow: 0 10px 24px rgba(255, 138, 61, 0.28);
        cursor: pointer;
      }

      .submit:disabled {
        opacity: 0.75;
        cursor: not-allowed;
      }

      .status {
        min-height: 20px;
        margin: 8px 0 0;
        font-size: 0.84rem;
      }

      .status.error {
        color: #ff9aa3;
      }

      .status.ok {
        color: #81f7e3;
      }

      .separator {
        display: grid;
        grid-template-columns: 1fr auto 1fr;
        align-items: center;
        gap: 10px;
        margin: 14px 0 6px;
        color: rgba(229, 231, 235, 0.76);
        font-size: 0.78rem;
      }

      .separator::before,
      .separator::after {
        content: "";
        height: 1px;
        background: rgba(229, 231, 235, 0.18);
      }

      .google-area {
        margin-top: 10px;
        display: flex;
        justify-content: center;
      }

      .google-note {
        margin-top: 8px;
        text-align: center;
        font-size: 0.78rem;
        color: rgba(229, 231, 235, 0.72);
      }

      .back-link {
        display: inline-block;
        margin-top: 16px;
        color: rgba(229, 231, 235, 0.9);
        text-decoration: none;
        font-size: 0.88rem;
      }

      .back-link:hover {
        color: var(--wf-cyan);
      }
    </style>
  </head>
  <body>
    <main class="register-shell" aria-label="Registro WebForge">
      <a class="brand" href="/" aria-label="Volver a WebForge">
        <img src="/assets/WebForgeLogo-NoBackground.png" alt="WebForge" />
        <strong>WebForge</strong>
      </a>

      <h1>Crear Cuenta</h1>
      <p>Crea tu cuenta para activar tu plan y gestionar tus servicios.</p>

      <form id="register-form" novalidate>
        <div>
          <label for="fullName">Nombre completo</label>
          <input id="fullName" name="fullName" type="text" required minlength="2" />
        </div>

        <div>
          <label for="phone">Teléfono</label>
          <input id="phone" name="phone" type="tel" placeholder="+54 9 ..." required minlength="5" />
        </div>

        <div class="grid">
          <div>
            <label for="email">Email</label>
            <input id="email" name="email" type="email" required />
          </div>

          <div>
            <label for="password">Contrasena</label>
            <input id="password" name="password" type="password" required minlength="8" />
          </div>
        </div>

        <label class="terms" for="termsAccepted">
          <input id="termsAccepted" name="termsAccepted" type="checkbox" required />
          <span>Acepto los <a href="/terminos.html" target="_blank" rel="noopener">terminos y condiciones</a>.</span>
        </label>

        <button class="submit" type="submit">Crear Cuenta</button>
        <p class="status" id="status" aria-live="polite"></p>
      </form>

      <div class="separator">o</div>
      <div class="google-area" id="google-button-container"></div>
      <p class="google-note" id="google-note">Google Sign-In no disponible.</p>

      <a class="back-link" href="/login.html">Ya tengo cuenta</a>
    </main>

    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <script>
      const form = document.getElementById('register-form')
      const statusNode = document.getElementById('status')
      const submitButton = form.querySelector('button[type="submit"]')
      const googleContainer = document.getElementById('google-button-container')
      const googleNote = document.getElementById('google-note')

      const setStatus = (message, type = '') => {
        statusNode.textContent = message
        statusNode.className = `status ${type}`.trim()
      }

        const parseApiResponse = async (response) => {
          const contentType = response.headers.get('content-type') || ''
          if (!contentType.includes('application/json')) {
            const raw = await response.text()
            return {
              success: false,
              message: raw?.trim() || `Respuesta no JSON del servidor (HTTP ${response.status}).`,
            }
          }

          const raw = await response.text()
          if (!raw) {
            return {
              success: false,
              message: `Respuesta vacia del servidor (HTTP ${response.status}).`,
            }
          }

          try {
            return JSON.parse(raw)
          } catch {
            return {
              success: false,
              message: `JSON invalido del servidor (HTTP ${response.status}).`,
            }
          }
        }

        const getHttpErrorMessage = (response, result, fallbackMessage) => {
          if (result?.message) return result.message
          if (response.status === 502 || response.status === 503) {
            return 'El backend no esta disponible. Inicia el servidor API y vuelve a intentar.'
          }
          return fallbackMessage
        }

      const redirectByRole = (result) => {
        const role = result?.user?.accountType
        if (role === 'CEO' || role === 'SUPER_ADMIN') return '/admin.html'
        return '/cuenta.html'
      }

      const handleAuthSuccess = (result) => {
        localStorage.setItem('webforge_token', result.token)
        localStorage.setItem('webforge_user', JSON.stringify(result.user || {}))
        setStatus('Cuenta creada correctamente. Redirigiendo...', 'ok')
        const pendingPlan = sessionStorage.getItem('webforge_pending_plan')
        setTimeout(() => {
          if (pendingPlan) {
            sessionStorage.removeItem('webforge_pending_plan')
            window.location.href = '/plans.html'
            return
          }
          window.location.href = redirectByRole(result)
        }, 550)
      }

      form.addEventListener('submit', async (event) => {
        event.preventDefault()
        setStatus('')

        const formData = new FormData(form)
        const payload = {
          name: String(formData.get('fullName') || '').trim(),
          phone: String(formData.get('phone') || '').trim() || undefined,
          email: String(formData.get('email') || '').trim(),
          password: String(formData.get('password') || ''),
          termsAccepted: Boolean(formData.get('termsAccepted')),
        }

        if (!payload.termsAccepted) {
          setStatus('Debes aceptar los terminos y condiciones.', 'error')
          return
        }

        submitButton.disabled = true
        submitButton.textContent = 'Creando...'

        try {
          const response = await fetch('/api/auth/register', {
            method: 'POST',
            headers: {
              'Content-Type': 'application/json',
              Accept: 'application/json',
            },
            body: JSON.stringify(payload),
          })

            const result = await parseApiResponse(response)
          if (!response.ok || !result.success || !result.token) {
              throw new Error(getHttpErrorMessage(response, result, 'No se pudo crear la cuenta'))
          }

          handleAuthSuccess(result)
        } catch (error) {
          setStatus(error.message || 'Error de registro.', 'error')
        } finally {
          submitButton.disabled = false
          submitButton.textContent = 'Crear Cuenta'
        }
      })

      const initGoogle = async () => {
        try {
          const response = await fetch('/api/auth/google/config', { headers: { Accept: 'application/json' } })
            const config = await parseApiResponse(response)

          if (!response.ok || !config.enabled || !config.clientId || !window.google?.accounts?.id) {
            googleNote.textContent = 'Registro con Google no disponible en este entorno.'
            return
          }

          window.google.accounts.id.initialize({
            client_id: config.clientId,
            callback: async (googleResponse) => {
              setStatus('Validando Google...')
              document.getElementById('termsAccepted').checked = true
              try {
                const authResponse = await fetch('/api/auth/google', {
                  method: 'POST',
                  headers: {
                    'Content-Type': 'application/json',
                    Accept: 'application/json',
                  },
                  body: JSON.stringify({ credential: googleResponse.credential }),
                })

                  const authResult = await parseApiResponse(authResponse)
                if (!authResponse.ok || !authResult.success || !authResult.token) {
                    throw new Error(getHttpErrorMessage(authResponse, authResult, 'No se pudo continuar con Google'))
                }

                handleAuthSuccess(authResult)
              } catch (error) {
                setStatus(error.message || 'Error con Google Sign-In.', 'error')
              }
            },
          })

          window.google.accounts.id.renderButton(googleContainer, {
            type: 'standard',
            theme: 'outline',
            text: 'continue_with',
            shape: 'pill',
            size: 'large',
            width: 340,
          })

          googleNote.textContent = 'Tambien puedes crear tu cuenta con Google.'
        } catch {
          googleNote.textContent = 'Registro con Google no disponible en este entorno.'
        }
      }

      window.addEventListener('load', initGoogle)
    </script>
  </body>
  <script src="/cookie-banner.js" defer></script>
  </body>
</html>
