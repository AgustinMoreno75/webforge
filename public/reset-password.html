<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>WebForge | Restablecer contraseña</title>
    <link rel="icon" type="image/png" href="/assets/WebForgeLogoMain.png" />
    <style>
      :root {
        --wf-dark-blue: #0b1d3a;
        --wf-cyan: #22c1c3;
        --wf-purple: #6a5ae0;
        --wf-orange: #ff8a3d;
        --wf-red: #ff4d5a;
        --wf-white: #ffffff;
        --wf-border: rgba(229, 231, 235, 0.2);
        --wf-surface: rgba(8, 20, 42, 0.78);
        --wf-shadow: 0 14px 40px rgba(0, 0, 0, 0.35);
        --wf-gradient: linear-gradient(110deg, var(--wf-cyan), var(--wf-purple), var(--wf-orange), var(--wf-red));
      }

      *, *::before, *::after { box-sizing: border-box; }

      html, body {
        margin: 0;
        padding: 0;
        min-height: 100vh;
        font-family: "Inter", sans-serif;
        color: var(--wf-white);
        background:
          radial-gradient(circle at 10% -20%, rgba(34, 193, 195, 0.22), transparent 46%),
          radial-gradient(circle at 92% 20%, rgba(106, 90, 224, 0.2), transparent 36%),
          radial-gradient(circle at 50% 110%, rgba(255, 77, 90, 0.2), transparent 43%),
          var(--wf-dark-blue);
        display: grid;
        place-items: center;
        padding: 24px;
      }

      body::before {
        content: "";
        position: fixed;
        inset: 0;
        pointer-events: none;
        background-image:
          linear-gradient(rgba(255,255,255,0.015) 1px, transparent 1px),
          linear-gradient(90deg, rgba(255,255,255,0.015) 1px, transparent 1px);
        background-size: 28px 28px;
        opacity: 0.75;
      }

      .shell {
        position: relative;
        z-index: 1;
        width: min(440px, 100%);
        border: 1px solid var(--wf-border);
        border-radius: 18px;
        background: var(--wf-surface);
        backdrop-filter: blur(14px);
        box-shadow: var(--wf-shadow);
        padding: 36px 32px;
      }

      .brand {
        display: inline-flex;
        align-items: center;
        gap: 10px;
        text-decoration: none;
        margin-bottom: 28px;
      }

      .brand img { width: 36px; height: 36px; object-fit: contain; }

      .brand strong {
        font-family: "Montserrat", sans-serif;
        font-weight: 800;
        font-size: 1rem;
        color: var(--wf-white);
        letter-spacing: 0.01em;
      }

      h1 {
        font-family: "Montserrat", sans-serif;
        font-size: 1.45rem;
        font-weight: 800;
        margin: 0 0 8px;
      }

      .subtitle {
        font-size: 0.85rem;
        color: rgba(255,255,255,0.5);
        margin: 0 0 28px;
        line-height: 1.5;
      }

      .form-group {
        display: flex;
        flex-direction: column;
        gap: 6px;
        margin-bottom: 16px;
      }

      label {
        font-size: 0.75rem;
        font-weight: 600;
        color: rgba(255,255,255,0.5);
        text-transform: uppercase;
        letter-spacing: 0.06em;
      }

      input {
        background: rgba(255, 255, 255, 0.06);
        border: 1px solid var(--wf-border);
        border-radius: 10px;
        padding: 11px 14px;
        font-size: 0.92rem;
        font-family: "Inter", sans-serif;
        color: var(--wf-white);
        outline: none;
        transition: border-color 0.2s;
        width: 100%;
      }

      input:focus { border-color: var(--wf-cyan); }
      input::placeholder { color: rgba(255,255,255,0.22); }

      .strength-bar-wrap {
        height: 4px;
        background: rgba(255,255,255,0.1);
        border-radius: 4px;
        overflow: hidden;
        margin-top: 6px;
      }

      .strength-bar {
        height: 100%;
        border-radius: 4px;
        width: 0%;
        transition: width 0.3s, background 0.3s;
      }

      .strength-label {
        font-size: 0.7rem;
        margin-top: 4px;
        font-weight: 600;
        color: rgba(255,255,255,0.3);
      }

      .btn-submit {
        width: 100%;
        margin-top: 8px;
        padding: 13px;
        border: none;
        border-radius: 12px;
        background: var(--wf-gradient);
        color: #fff;
        font-family: "Montserrat", sans-serif;
        font-size: 0.9rem;
        font-weight: 800;
        text-transform: uppercase;
        letter-spacing: 0.08em;
        cursor: pointer;
        transition: opacity 0.2s;
      }

      .btn-submit:hover:not(:disabled) { opacity: 0.88; }
      .btn-submit:disabled { opacity: 0.45; cursor: not-allowed; }

      .status-msg {
        min-height: 20px;
        font-size: 0.84rem;
        margin-top: 10px;
        text-align: center;
        line-height: 1.4;
      }
      .status-msg.error { color: #ff9aa3; }
      .status-msg.ok { color: #81f7e3; }

      .back-link {
        display: block;
        text-align: center;
        margin-top: 20px;
        color: rgba(229, 231, 235, 0.5);
        text-decoration: none;
        font-size: 0.82rem;
        transition: color 0.2s;
      }
      .back-link:hover { color: var(--wf-cyan); }

      /* Token invalid state */
      .error-state {
        text-align: center;
        padding: 20px 0;
      }
      .error-state .icon { font-size: 2.5rem; margin-bottom: 12px; }
      .error-state p { color: rgba(255,255,255,0.55); font-size: 0.88rem; margin: 0 0 20px; }
    </style>
  </head>
  <body>
    <div class="shell">
      <a class="brand" href="/">
        <img src="/assets/WebForgeLogo-NoBackground.png" alt="WebForge" />
        <strong>WebForge</strong>
      </a>

      <!-- Invalid token state (hidden by default) -->
      <div class="error-state" id="invalid-state" style="display:none;">
        <div class="icon">⚠️</div>
        <h1>Enlace inválido</h1>
        <p>Este enlace expiró o ya fue utilizado. Solicitá uno nuevo desde la página de login.</p>
        <a class="back-link" href="/login.html">← Volver al login</a>
      </div>

      <!-- Reset form (shown by default until server rejects token) -->
      <div id="form-wrapper">
        <h1>Nueva contraseña</h1>
        <p class="subtitle">Elegí una contraseña segura para tu cuenta WebForge.</p>

        <div class="form-group">
          <label for="new-pw">Nueva contraseña</label>
          <input type="password" id="new-pw" placeholder="Mín. 8 caracteres" minlength="8" maxlength="72" oninput="checkStrength(this.value)" />
          <div class="strength-bar-wrap">
            <div class="strength-bar" id="strength-bar"></div>
          </div>
          <span class="strength-label" id="strength-label">—</span>
        </div>

        <div class="form-group">
          <label for="confirm-pw">Confirmar contraseña</label>
          <input type="password" id="confirm-pw" placeholder="Repetí la nueva contraseña" maxlength="72" />
        </div>

        <button class="btn-submit" id="submit-btn" onclick="doReset()">Restablecer contraseña</button>
        <p class="status-msg" id="status-msg"></p>
        <a class="back-link" href="/login.html">← Volver al login</a>
      </div>
    </div>

    <script>
      const params = new URLSearchParams(window.location.search)
      const token = params.get('token')

      if (!token) {
        document.getElementById('form-wrapper').style.display = 'none'
        document.getElementById('invalid-state').style.display = 'block'
      }

      function checkStrength(val) {
        const bar = document.getElementById('strength-bar')
        const label = document.getElementById('strength-label')
        let score = 0
        if (val.length >= 8) score++
        if (val.length >= 12) score++
        if (/[A-Z]/.test(val)) score++
        if (/[0-9]/.test(val)) score++
        if (/[^A-Za-z0-9]/.test(val)) score++
        const levels = [
          { w: '20%', color: '#ff4d5a', text: 'Muy débil' },
          { w: '40%', color: '#ff8a3d', text: 'Débil' },
          { w: '60%', color: '#facc15', text: 'Regular' },
          { w: '80%', color: '#22c1c3', text: 'Fuerte' },
          { w: '100%', color: '#22c55e', text: 'Muy fuerte' },
        ]
        const lvl = levels[Math.min(score, 4)]
        bar.style.width = val.length === 0 ? '0%' : lvl.w
        bar.style.background = lvl.color
        label.textContent = val.length === 0 ? '—' : lvl.text
        label.style.color = val.length === 0 ? 'rgba(255,255,255,0.3)' : lvl.color
      }

      async function doReset() {
        const newPw = document.getElementById('new-pw').value
        const confirmPw = document.getElementById('confirm-pw').value
        const btn = document.getElementById('submit-btn')
        const status = document.getElementById('status-msg')

        if (newPw.length < 8) {
          setStatus('La contraseña debe tener al menos 8 caracteres.', 'error')
          return
        }
        if (newPw !== confirmPw) {
          setStatus('Las contraseñas no coinciden.', 'error')
          return
        }

        btn.disabled = true
        btn.textContent = 'Restableciendo...'
        status.textContent = ''

        try {
          const res = await fetch('/api/auth/reset-password', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json', Accept: 'application/json' },
            body: JSON.stringify({ token, newPassword: newPw }),
          })
          const data = await res.json()

          if (!res.ok || !data.success) {
            if (res.status === 401) {
              document.getElementById('form-wrapper').style.display = 'none'
              document.getElementById('invalid-state').style.display = 'block'
              return
            }
            throw new Error(data.message || 'Error al restablecer.')
          }

          setStatus('✓ Contraseña restablecida. Redirigiendo al login...', 'ok')
          btn.textContent = 'Listo ✓'
          setTimeout(() => { window.location.href = '/login.html' }, 2500)
        } catch (err) {
          setStatus(err.message, 'error')
          btn.disabled = false
          btn.textContent = 'Restablecer contraseña'
        }
      }

      function setStatus(msg, type) {
        const el = document.getElementById('status-msg')
        el.textContent = msg
        el.className = `status-msg ${type}`
      }
    </script>
  </body>
</html>
