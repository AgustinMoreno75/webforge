<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Verificar correo | WebForge</title>
  <link rel="icon" type="image/png" href="/assets/WebForgeLogoMain.png" />
  <style>
    :root {
      --bg: #0b1120;
      --card: #131c31;
      --border: rgba(255, 255, 255, 0.08);
      --text: #e2e8f0;
      --muted: #94a3b8;
      --blue: #2563eb;
      --green: #16a34a;
      --red: #dc2626;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
      font-family: Inter, system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
      background: radial-gradient(1200px 600px at 80% -10%, #16213f 0%, var(--bg) 55%);
      color: var(--text);
    }
    .card {
      width: min(520px, 100%);
      padding: 28px;
      border-radius: 20px;
      border: 1px solid var(--border);
      background: linear-gradient(180deg, var(--card), #0f172a);
      box-shadow: 0 24px 60px rgba(0, 0, 0, 0.35);
      text-align: center;
    }
    h1 { margin: 0 0 10px; font-size: 1.8rem; }
    p { margin: 0; line-height: 1.65; }
    .muted { color: var(--muted); }
    .status {
      margin-top: 18px;
      padding: 14px 16px;
      border-radius: 14px;
      border: 1px solid var(--border);
      font-weight: 600;
    }
    .status.ok { border-color: rgba(22,163,74,0.45); color: #bbf7d0; background: rgba(22,163,74,0.12); }
    .status.err { border-color: rgba(220,38,38,0.45); color: #fecaca; background: rgba(220,38,38,0.12); }
    .actions { margin-top: 22px; display: flex; justify-content: center; gap: 12px; flex-wrap: wrap; }
    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 44px;
      padding: 0 18px;
      border-radius: 12px;
      text-decoration: none;
      font-weight: 700;
      border: 1px solid var(--border);
      color: var(--text);
      background: rgba(255,255,255,0.04);
    }
    .btn-primary { background: var(--blue); border-color: var(--blue); color: #fff; }
  </style>
</head>
<body>
  <main class="card">
    <h1>Verificando tu correo</h1>
    <p class="muted">Estamos confirmando tu dirección de email en WebForge.</p>
    <div class="status" id="status">Procesando enlace…</div>
    <div class="actions">
      <a class="btn btn-primary" href="/login.html">Ir a login</a>
      <a class="btn" href="/">Volver al sitio</a>
    </div>
  </main>

  <script>
    (async function () {
      const status = document.getElementById('status')
      const token = new URLSearchParams(window.location.search).get('token')

      if (!token) {
        status.className = 'status err'
        status.textContent = 'Falta el token de verificación.'
        return
      }

      try {
        const response = await fetch('/api/auth/verify-email', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json', Accept: 'application/json' },
          body: JSON.stringify({ token }),
        })
        const result = await response.json().catch(() => ({}))

        if (!response.ok || !result.success) {
          throw new Error(result.message || 'No pudimos verificar tu correo.')
        }

        status.className = 'status ok'
        status.textContent = result.message || 'Correo verificado correctamente.'
      } catch (error) {
        status.className = 'status err'
        status.textContent = error.message || 'No pudimos verificar tu correo.'
      }
    })()
  </script>
</body>
</html>
